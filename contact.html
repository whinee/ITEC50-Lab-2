    <div id="wrapper">
        <div id="main">
            <div class="inner">
                <header>
                    <h1>Contact Form</h1>
                </header>
                <section>
                    <h2>Want to get in contact with me?</h2>
                    <p>Fill up the form below and let's talk!</p>

                    <form action="#" method="POST">
                        <label for="name">Name:</label><br><br>
                        <div class="form-box">
                            <input class="input" type="text"
                                placeholder="Your Name (not the anime!)"
                                class="form" required>
                            <btn class="icon1" class="erase-input" style="visibility: hidden;">×</btn>
                        </div><br><br>

                        <label for="email">Email:</label><br><br>
                        <div class="form-box">
                            <input class="input" type="text"
                                placeholder="you@example.com"
                                class="form" pattern="[^@\s]+@[^@\s]+\.[^@\s]+" required>
                            <btn class="icon1" class="erase-input" style="visibility: hidden;">×</btn>
                        </div><br><br>

                        <label for="comments">Message:</label><br><br>
                        <textarea class="input" id="comments" name="comments" rows="5" placeholder="Your thoughts..." required></textarea>
                        <btn class="icon1" class="erase-input" style="visibility: hidden;">×</btn><br><br>

                        <button type="submit">Submit Message</button>
                    </form>
                </section>
            </div>
        </div>
    </div>
